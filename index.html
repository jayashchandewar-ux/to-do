<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
padding:25px;
border-radius:15px;
width:100%;
max-width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.container:hover{
transform:translateY(-5px);
}

h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
outline:none;
font-size:14px;
}

input:focus{
border-color:#667eea;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5a67d8;
}

ul{
list-style:none;
padding:0;
margin-top:15px;
}

li{
background:#f1f1f1;
margin-top:10px;
padding:10px 12px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
}

li:hover{
background:#e2e8f0;
}

li button{
background:#ff4d4d;
padding:6px 10px;
font-size:12px;
}

li button:hover{
background:#e60000;
}

/* Responsive */

@media (max-width:500px){

.container{
padding:20px;
}

input{
width:65%;
font-size:13px;
}

button{
padding:9px 12px;
}

}
</style>

</head>

<body>

<div class="container">

<h2>To Do List</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

let input = document.getElementById("taskInput");

let task = input.value;

if(task === ""){
alert("Please enter task");
return;
}

let li = document.createElement("li");

li.innerHTML = task + 
" <button onclick='deleteTask(this)'>Delete</button>";

document.getElementById("taskList").appendChild(li);

input.value = "";

}

function deleteTask(button){

button.parentElement.remove();

}

</script>

</body>
</html>
